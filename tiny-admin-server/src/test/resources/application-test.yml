spring:
  datasource:
    url: jdbc:h2:mem:tinyadmin;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms
  sql:
    init:
      mode: always
      encoding: UTF-8
  quartz:
    job-store-type: memory
tiny-admin:
  security:
    issuer: tiny-admin-test
    access-token-ttl: PT30M
    refresh-token-ttl: P7D
    secret: test-secret-key-test-secret-key-test-secret-key
  file:
    storage-path: ./build/test-uploads
